name: Stratify

# Run Stratify on the codebase on every commit and pull request. Report-only:
# results are uploaded to GitHub code scanning as annotations and the job does
# not fail the build (`stratify check` defaults to `--fail-on never`). Tighten
# to a gate later by adding `--fail-on warning` once findings are triaged.
on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Build the binary from the current commit so the scan reflects the code
      # being committed (not a released version).
      - name: Build stratify
        run: cargo build -p stratify-cli --locked

      # Readable summary in the job log.
      - name: Scan (summary)
        run: ./target/debug/stratify check . --format human

      # SARIF for GitHub code scanning annotations.
      - name: Scan (SARIF)
        run: ./target/debug/stratify check . --format sarif > stratify.sarif

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: stratify.sarif
          category: stratify
