name: Stratify

# Run Stratify on the codebase on every commit and pull request, using the
# published prebuilt binary via our own Marketplace action (dogfooding it) —
# no compile here. Report-only: results go to GitHub code scanning as
# annotations and the job does not fail the build (`fail-on: never`). Current
# code is compiled and tested by ci.yml; this scan reflects the latest released
# Stratify. Tighten to a gate later with `fail-on: warning` once a baseline is
# in place.
on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the prebuilt `stratify` binary (downloaded from the latest
      # release) and runs the gate report-only. No Rust toolchain, no build.
      - uses: stratify-dev/stratify@v0.4.0
        with:
          fail-on: never

      # Reuse the installed binary to emit SARIF for code scanning.
      - name: Scan (SARIF)
        run: stratify check . --format sarif > stratify.sarif

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: stratify.sarif
          category: stratify
