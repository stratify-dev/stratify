# Stratify's own configuration, used when scanning this repo.
# The test fixtures under crates/*/tests/ are intentionally broken sample code
# (dead functions, cycles, duplication) used to exercise the analyses, so they
# are excluded from self-analysis.
[ignore]
paths = ["crates/*/tests/**"]

# Minimum identical normalized-token run length to count as a clone. The six
# language adapters share structural shape, so a low threshold floods the report
# with short parallel fragments. 100 matches the default and keeps real clones.
[duplication]
min_tokens = 100
